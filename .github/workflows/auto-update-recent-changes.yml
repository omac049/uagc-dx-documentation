name: Auto-Update Recent Changes

on:
  push:
    branches: [main]
    paths:
      - 'new-docs/**'
      - 'scripts/**'
      - 'docusaurus.config.js'
      - 'sidebars.js'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-update-recent-changes
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update-recent-changes:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-updates]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 50
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Auto-Update Bot"

      - name: Check for documentation changes
        id: check-changes
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- new-docs/ scripts/ docusaurus.config.js sidebars.js || echo "")

          if [ -z "$CHANGED_FILES" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "changed_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Generate recent updates
        if: steps.check-changes.outputs.has_changes == 'true'
        run: node scripts/auto-update-recent.js

      - name: Check for updates to commit
        if: steps.check-changes.outputs.has_changes == 'true'
        id: check-updates
        run: |
          if git diff --quiet new-docs/recent-updates.md; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updates
        if: steps.check-changes.outputs.has_changes == 'true' && steps.check-updates.outputs.has_updates == 'true'
        run: |
          git add new-docs/recent-updates.md
          git commit -m "Auto-update recent changes [skip-updates]"
          git push origin main

      - name: Create summary
        if: always()
        run: |
          echo "## Recent Updates Auto-Generation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** Push to main" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${GITHUB_SHA:0:7}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check-updates.outputs.has_updates }}" == "true" ]; then
            echo "**Status:** recent-updates.md updated" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** No updates needed" >> $GITHUB_STEP_SUMMARY
          fi
