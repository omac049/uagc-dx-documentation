name: Automated Dependency Updates

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of updates to perform'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - all

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "dependency-updates"
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-updates:
    name: Check for Updates
    runs-on: ubuntu-latest

    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      update_summary: ${{ steps.check.outputs.summary }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm-check-updates
        run: npm install -g npm-check-updates

      - name: Check for outdated dependencies
        id: check
        run: |
          UPDATE_TYPE="${{ github.event.inputs.update_type || 'patch' }}"

          case $UPDATE_TYPE in
            "patch") NCU_OPTIONS="--target patch" ;;
            "minor") NCU_OPTIONS="--target minor" ;;
            "all")   NCU_OPTIONS="" ;;
          esac

          UPDATES=$(ncu $NCU_OPTIONS 2>&1) || true

          if echo "$UPDATES" | grep -q "→"; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            SUMMARY=$(echo "$UPDATES" | grep "→" | head -20)
            echo "summary<<EOF" >> $GITHUB_OUTPUT
            echo "$SUMMARY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "summary=No updates available" >> $GITHUB_OUTPUT
          fi

  apply-updates:
    name: Apply Updates
    runs-on: ubuntu-latest
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'true'

    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
      branch_name: ${{ steps.commit.outputs.branch_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm-check-updates
        run: npm install -g npm-check-updates

      - name: Apply updates
        id: apply
        run: |
          UPDATE_TYPE="${{ github.event.inputs.update_type || 'patch' }}"

          case $UPDATE_TYPE in
            "patch") NCU_OPTIONS="--target patch"; BRANCH_SUFFIX="patch" ;;
            "minor") NCU_OPTIONS="--target minor"; BRANCH_SUFFIX="minor" ;;
            "all")   NCU_OPTIONS=""; BRANCH_SUFFIX="major" ;;
          esac

          echo "branch_suffix=$BRANCH_SUFFIX" >> $GITHUB_OUTPUT
          ncu $NCU_OPTIONS -u
          npm install --legacy-peer-deps

      - name: Test updates
        run: |
          npm ci --prefer-offline --no-audit
          npx docusaurus --version
          npm run build

      - name: Create branch and commit
        id: commit
        run: |
          BRANCH_NAME="deps/${{ steps.apply.outputs.branch_suffix }}-$(date +%Y%m%d)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git checkout -b "$BRANCH_NAME"
          git add package*.json

          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            UPDATE_TYPE="${{ github.event.inputs.update_type || 'patch' }}"
            git commit -m "Automated dependency updates ($UPDATE_TYPE)"
            git push origin "$BRANCH_NAME"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  create-pr:
    name: Create Pull Request
    runs-on: ubuntu-latest
    needs: [check-updates, apply-updates]
    if: needs.apply-updates.outputs.has_changes == 'true'

    steps:
      - name: Create pull request
        uses: actions/github-script@v7
        with:
          script: |
            const updateType = '${{ github.event.inputs.update_type || 'patch' }}';
            const branchName = '${{ needs.apply-updates.outputs.branch_name }}';
            const summary = `${{ needs.check-updates.outputs.update_summary }}`;

            const typeDesc = {
              patch: 'bug fixes only',
              minor: 'new features + bug fixes',
              all: 'all available updates'
            };

            const body = [
              '## Automated Dependency Updates',
              '',
              '### Updates Applied',
              '```',
              summary,
              '```',
              '',
              '### Validation',
              '- Dependencies installed successfully',
              '- Docusaurus configuration validated',
              '- Site build completed successfully',
              '',
              `**Update Type:** ${updateType} (${typeDesc[updateType] || updateType})`,
              '',
              '---',
              `*Auto-generated on ${new Date().toISOString().split('T')[0]}*`
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Dependency updates (${updateType})`,
              head: branchName,
              base: 'main',
              body,
            });

            console.log(`Created PR #${pr.number}: ${pr.html_url}`);

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['dependencies', 'automated'],
              });
            } catch (e) {
              console.log('Could not add labels:', e.message);
            }
