name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'new-docs/**'
      - 'static/**'
      - 'src/**'
      - 'docusaurus.config.js'
      - 'sidebars.js'
      - 'package*.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even if no changes detected'
        required: false
        default: false
        type: boolean
      skip_tests:
        description: 'Skip optional tests (faster deployment)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-deployment"
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest

    outputs:
      should_deploy: ${{ steps.changes.outputs.docs_changed == 'true' || github.event.inputs.force_deploy == 'true' }}
      cache_key: ${{ steps.cache_key.outputs.key }}
      skip_tests: ${{ github.event.inputs.skip_tests == 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 2

      - name: Check for documentation changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "docs_changed=true" >> $GITHUB_OUTPUT
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
            if echo "$CHANGED_FILES" | grep -qE '\.(md|mdx|js|json|yml|yaml|css|scss)$|^(new-docs|static|src)/'; then
              echo "docs_changed=true" >> $GITHUB_OUTPUT
            else
              echo "docs_changed=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.docs_changed == 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Generate cache key
        id: cache_key
        if: steps.changes.outputs.docs_changed == 'true'
        run: |
          HASH="${{ hashFiles('package-lock.json', 'new-docs/**', 'static/**', 'docusaurus.config.js') }}"
          echo "key=v4-docs-${HASH}" >> $GITHUB_OUTPUT

      - name: Restore build cache
        if: steps.changes.outputs.docs_changed == 'true'
        uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
        with:
          path: |
            ~/.npm
            node_modules
            .docusaurus
          key: ${{ steps.cache_key.outputs.key }}
          restore-keys: v4-docs-

      - name: Install dependencies
        if: steps.changes.outputs.docs_changed == 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Security audit
        if: steps.changes.outputs.docs_changed == 'true' && github.event.inputs.skip_tests != 'true'
        continue-on-error: true
        run: npm audit --audit-level high --production

      - name: Validate configuration
        if: steps.changes.outputs.docs_changed == 'true'
        run: npx docusaurus --version

  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should_deploy == 'true'

    outputs:
      build_size: ${{ steps.build_info.outputs.size }}
      build_time: ${{ steps.build_info.outputs.time }}
      build_files: ${{ steps.build_info.outputs.files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore build cache
        uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
        with:
          path: |
            ~/.npm
            node_modules
            .docusaurus
          key: ${{ needs.validate.outputs.cache_key }}
          restore-keys: v4-docs-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build website
        run: |
          START_TIME=$(date +%s)
          NODE_ENV=production npm run build
          END_TIME=$(date +%s)
          echo "BUILD_TIME=$((END_TIME - START_TIME))" >> $GITHUB_ENV

      - name: Build information
        id: build_info
        run: |
          BUILD_SIZE=$(du -sh build | cut -f1)
          BUILD_FILES=$(find build -type f | wc -l)
          echo "size=${BUILD_SIZE}" >> $GITHUB_OUTPUT
          echo "time=${BUILD_TIME}" >> $GITHUB_OUTPUT
          echo "files=${BUILD_FILES}" >> $GITHUB_OUTPUT

      - name: Validate build output
        run: test -f build/index.html || { echo "Missing index.html"; exit 1; }

      - name: Optimize build
        run: |
          find build -name "*.map" -type f -delete 2>/dev/null || true
          find build -name ".DS_Store" -type f -delete 2>/dev/null || true
          find build -type d -empty -delete 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: build
          retention-days: 1

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: needs.validate.outputs.should_deploy == 'true'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
        with:
          timeout: 600000

      - name: Deployment summary
        run: |
          echo "## Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Size:** ${{ needs.build.outputs.build_size }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** ${{ needs.build.outputs.build_time }}s" >> $GITHUB_STEP_SUMMARY
          echo "**Files:** ${{ needs.build.outputs.build_files }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy, validate]
    if: always() && needs.deploy.result == 'success'

    steps:
      - name: Verify website accessibility
        run: |
          SITE_URL="${{ needs.deploy.outputs.page_url }}"
          if [ -z "$SITE_URL" ]; then
            SITE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi

          sleep 30

          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f -s -I "$SITE_URL" > /dev/null; then
              echo "Website is accessible at $SITE_URL"
              curl -f -s "$SITE_URL" | grep -q "UAGC DX" && echo "Homepage content verified"
              exit 0
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            [ $RETRY_COUNT -lt $MAX_RETRIES ] && sleep 15
          done

          echo "Website accessibility check failed after $MAX_RETRIES attempts"
          curl -v "$SITE_URL" || true
          exit 1

      - name: Performance check
        if: needs.validate.outputs.skip_tests != 'true'
        run: |
          SITE_URL="${{ needs.deploy.outputs.page_url }}"
          START_TIME=$(date +%s%3N)
          curl -f -s "$SITE_URL" > /dev/null
          END_TIME=$(date +%s%3N)
          LOAD_TIME=$((END_TIME - START_TIME))

          echo "Page load time: ${LOAD_TIME}ms" >> $GITHUB_STEP_SUMMARY
          if [ $LOAD_TIME -gt 3000 ]; then
            echo "Warning: Page load time (${LOAD_TIME}ms) exceeds 3s" >> $GITHUB_STEP_SUMMARY
          fi

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [validate, build, deploy, verify]
    if: always() && (needs.build.result == 'failure' || needs.deploy.result == 'failure' || needs.verify.result == 'failure')

    steps:
      - name: Create failure summary
        run: |
          echo "## Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the workflow logs above for error details." >> $GITHUB_STEP_SUMMARY
