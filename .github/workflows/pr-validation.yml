name: Pull Request Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'new-docs/**'
      - 'static/**'
      - 'src/**'
      - 'docusaurus.config.js'
      - 'sidebars.js'
      - 'package*.json'

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate Changes
    runs-on: ubuntu-latest

    outputs:
      should_build: ${{ steps.changes.outputs.docs_changed }}

    steps:
      - name: Checkout PR
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -qE '\.(md|mdx|js|json|yml|yaml|css|scss)$|^(new-docs|static|src)/'; then
            echo "docs_changed=true" >> $GITHUB_OUTPUT
          else
            echo "docs_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.docs_changed == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        if: steps.changes.outputs.docs_changed == 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Security check
        if: steps.changes.outputs.docs_changed == 'true'
        continue-on-error: true
        run: npm audit --audit-level high --production

      - name: Validate configuration
        if: steps.changes.outputs.docs_changed == 'true'
        run: npx docusaurus --version

      - name: Check markdown syntax
        if: steps.changes.outputs.docs_changed == 'true'
        run: |
          MARKDOWN_FILES=$(git diff --name-only origin/main...HEAD | grep -E '\.(md|mdx)$' || true)

          if [ -n "$MARKDOWN_FILES" ]; then
            echo "Checking markdown files:"
            for file in $MARKDOWN_FILES; do
              [ -f "$file" ] && echo "  $file"
            done
          fi

  build-preview:
    name: Build Preview
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should_build == 'true'

    steps:
      - name: Checkout PR
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build preview
        id: build
        run: |
          START_TIME=$(date +%s)
          npm run build
          END_TIME=$(date +%s)
          BUILD_TIME=$((END_TIME - START_TIME))
          BUILD_SIZE=$(du -sh build | cut -f1)
          BUILD_FILES=$(find build -type f | wc -l)

          echo "time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "size=$BUILD_SIZE" >> $GITHUB_OUTPUT
          echo "files=$BUILD_FILES" >> $GITHUB_OUTPUT

      - name: Build summary
        run: |
          echo "## Build Preview Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Build successful" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ${{ steps.build.outputs.size }}" >> $GITHUB_STEP_SUMMARY
          echo "**Files:** ${{ steps.build.outputs.files }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** ${{ steps.build.outputs.time }}s" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## Build Preview',
              '',
              `**Status:** Successful`,
              `**Size:** ${{ steps.build.outputs.size }}`,
              `**Build Time:** ${{ steps.build.outputs.time }}s`,
              '',
              'Changes will be deployed automatically when merged to main.',
              '',
              '---',
              '*Automated preview by GitHub Actions*'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('## Build Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [validate, build-preview]
    if: always()

    steps:
      - name: Create PR summary
        run: |
          echo "## Pull Request Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.validate.result }}" == "success" ]; then
            echo "- Validation: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Validation: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.build-preview.result }}" == "success" ]; then
            echo "- Build Preview: Successful" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.build-preview.result }}" == "skipped" ]; then
            echo "- Build Preview: Skipped (no doc changes)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Build Preview: Failed" >> $GITHUB_STEP_SUMMARY
          fi
